schema_version: 1
name: node24
version: latest
description: "Installs Node"
args:
- name: NODE_VERSION
  value: v24.14.0
- name: NODE_EXTRA_CA_CERTS
envs:
- name: PATH
  value: ${PATH}:/usr/local/node/bin
# Uncomment the artifacts section below to embed a global npmrc into the container image.
# Note: Also uncomment the relevant lines in the install.sh script
#
# artifacts:
# - name: npmrc
#   path: npmrc
#   target: npmrc
#   dest: /
execute:
- script: install.sh