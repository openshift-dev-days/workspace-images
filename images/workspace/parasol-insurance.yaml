name: parasol-insurance
from: image-registry.openshift-image-registry.svc:5000/workspace-images/workspace-base:ubi10
version: latest
packages:
  manager: dnf
  manager_flags: "--disableplugin=subscription-manager --setopt=tsflags=nodocs --setopt=install_weak_deps=0"
modules:
  repositories:
  - path: "../../modules"
  install:
  - name: node20
  - name: java21
  - name: maven
  - name: quarkus
  - name: opencode
