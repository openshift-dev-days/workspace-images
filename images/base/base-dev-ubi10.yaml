name: workspace-base
from: image-registry.openshift-image-registry.svc:5000/workspace-images/ubi10:10.2
version: ubi10
packages:
  manager: dnf
  manager_flags: "--disableplugin=subscription-manager --setopt=tsflags=nodocs --setopt=install_weak_deps=0"
  install:
  - https://dl.fedoraproject.org/pub/epel/epel-release-latest-10.noarch.rpm
  - wget
modules:
  repositories:
  - path: "../../modules"
  install:
  - name: dev-base
  - name: yq
